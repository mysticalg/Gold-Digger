name: Deploy Gold Digger to GitHub Pages

on:
  # Automatically deploy the static game whenever code is pushed.
  # Using all branches ensures deployments still run even if the default
  # branch name changes (for example: main/master/work).
  push:
  workflow_dispatch:

# Only allow one in-flight Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy static game
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # Upload the repository root as the Pages artifact.
      # This works for static sites where index.html is in the root.
      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
